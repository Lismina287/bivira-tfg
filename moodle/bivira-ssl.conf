<VirtualHost *:443>
    ServerName 192.168.1.149
    DocumentRoot /var/www/html

    SSLEngine on
    SSLCertificateFile /etc/ssl/bivira/bivira.crt
    SSLCertificateKeyFile /etc/ssl/bivira/bivira.key

    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>
